services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: jpyc
      POSTGRES_PASSWORD: jpyc
      POSTGRES_DB: jpyc_x402_facilitator
    volumes:
      - jpyc_x402_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jpyc"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  jpyc_x402_pg:
